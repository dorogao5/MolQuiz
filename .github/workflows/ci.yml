name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  MOLQUIZ_ENV_FILE: .env.example

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run ruff check src tests alembic

      - name: Run tests
        run: uv run pytest

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker compose configuration
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: molquiz-app:ci
          cache-from: type=gha,scope=molquiz-app-ci
          cache-to: type=gha,mode=max,scope=molquiz-app-ci

      - name: Build OPSIN image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/opsin
          push: false
          tags: molquiz-opsin:ci
          cache-from: type=gha,scope=molquiz-opsin-ci
          cache-to: type=gha,mode=max,scope=molquiz-opsin-ci
