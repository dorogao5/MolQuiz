name: molquiz

x-app-base: &app-base
  image: ${MOLQUIZ_APP_IMAGE:-molquiz-bot}
  build:
    context: .
  env_file:
    - ${MOLQUIZ_ENV_FILE:-.env}

x-runtime-environment: &runtime-environment
  MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
  MOLQUIZ_REDIS_URL: redis://redis:6379/0
  MOLQUIZ_OPSIN_BASE_URL: http://opsin:8080
  MOLQUIZ_STORAGE_DIR: /app/storage
  MOLQUIZ_ENVIRONMENT: production

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: molquiz
      POSTGRES_USER: molquiz
      POSTGRES_PASSWORD: molquiz
    ports:
      - "127.0.0.1:${MOLQUIZ_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molquiz -d molquiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MOLQUIZ_REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opsin:
    image: ${MOLQUIZ_OPSIN_IMAGE:-molquiz-opsin}
    build:
      context: ./docker/opsin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MOLQUIZ_OPSIN_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  migrate:
    <<: *app-base
    environment:
      MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
      MOLQUIZ_ENVIRONMENT: production
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    <<: *app-base
    restart: unless-stopped
    environment: *runtime-environment
    command: ["uv", "run", "molquiz-dev"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage

  bot-web:
    <<: *app-base
    restart: unless-stopped
    profiles: ["prod"]
    environment: *runtime-environment
    command: ["uv", "run", "molquiz-web"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8081"
    volumes:
      - storage_data:/app/storage

  worker:
    <<: *app-base
    restart: unless-stopped
    environment: *runtime-environment
    command: ["uv", "run", "molquiz-worker"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage

  caddy:
    image: caddy:2.8
    profiles: ["prod"]
    restart: unless-stopped
    depends_on:
      - bot-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
    name: molquiz_postgres_data
  redis_data:
    name: molquiz_redis_data
  storage_data:
    name: molquiz_storage_data
  caddy_data:
    name: molquiz_caddy_data
  caddy_config:
    name: molquiz_caddy_config
