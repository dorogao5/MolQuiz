services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: molquiz
      POSTGRES_USER: molquiz
      POSTGRES_PASSWORD: molquiz
    ports:
      - "127.0.0.1:${MOLQUIZ_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molquiz -d molquiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-bookworm
    ports:
      - "127.0.0.1:${MOLQUIZ_REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opsin:
    build:
      context: ./docker/opsin
    ports:
      - "127.0.0.1:${MOLQUIZ_OPSIN_HOST_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
    env_file:
      - .env
    environment:
      MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
      MOLQUIZ_ENVIRONMENT: production
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
      MOLQUIZ_REDIS_URL: redis://redis:6379/0
      MOLQUIZ_OPSIN_BASE_URL: http://opsin:8080
      MOLQUIZ_STORAGE_DIR: /app/storage
      MOLQUIZ_ENVIRONMENT: production
    command: ["uv", "run", "molquiz-dev"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage

  bot-web:
    build:
      context: .
    restart: unless-stopped
    profiles: ["prod"]
    env_file:
      - .env
    environment:
      MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
      MOLQUIZ_REDIS_URL: redis://redis:6379/0
      MOLQUIZ_OPSIN_BASE_URL: http://opsin:8080
      MOLQUIZ_STORAGE_DIR: /app/storage
      MOLQUIZ_ENVIRONMENT: production
    command: ["uv", "run", "molquiz-web"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8081"
    volumes:
      - storage_data:/app/storage

  worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MOLQUIZ_DATABASE_URL: postgresql+asyncpg://molquiz:molquiz@postgres:5432/molquiz
      MOLQUIZ_REDIS_URL: redis://redis:6379/0
      MOLQUIZ_OPSIN_BASE_URL: http://opsin:8080
      MOLQUIZ_STORAGE_DIR: /app/storage
      MOLQUIZ_ENVIRONMENT: production
    command: ["uv", "run", "molquiz-worker"]
    depends_on:
      redis:
        condition: service_healthy
      opsin:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - storage_data:/app/storage

  caddy:
    image: caddy:2.8
    profiles: ["prod"]
    depends_on:
      - bot-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  storage_data:
  caddy_data:
  caddy_config:
